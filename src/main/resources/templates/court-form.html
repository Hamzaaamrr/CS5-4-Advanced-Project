<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Court</title>
    <style>
        body {
             font-family: "Segoe UI", Tahoma, sans-serif; 
             margin: 0; background: #f8fafc; 
             color: #1f2937; 
            }
        .container { 
            max-width: 780px; 
            margin: 0 auto; 
            padding: 24px; 
        }
        form { 
            background: #fff; 
            border: 1px solid #e5e7eb; 
            border-radius: 10px; 
            padding: 18px; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; }
        label { 
            font-size: 13px; 
            display: block; 
            margin-bottom: 4px; 
            color: #475569; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        textarea { 
            min-height: 80px; 
        }
        .full { 
            grid-column: 1 / -1; 
        }
        .actions { 
            margin-top: 14px; 
            display: flex; 
            gap: 8px; 
        }
        .btn { 
            border: 0; 
            background: #0f766e; 
            color: #fff; 
            padding: 9px 12px; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        .link { padding: 9px 12px; 
            text-decoration: none; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            color: #334155; 
        }
        .top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        .nav { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .nav a { 
            text-decoration: none; 
            color: #1d4ed8; 
            font-weight: 700; 
        }
        .logout-btn { 
            border: 0; 
            border-radius: 8px; 
            background: #334155; 
            color: #fff; 
            padding: 8px 10px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top">
        <h1>Create Court</h1>
        <div class="nav">
            <a th:href="@{/home}">Courts</a>
            <a th:href="@{/bookings}">My Bookings</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button class="logout-btn" type="submit">Logout</button>
            </form>
        </div>
    </div>
    <form th:action="@{/courts}" th:object="${court}" method="post">
        <div class="grid">
            <div><label>Name</label><input th:field="*{name}" required></div>
            <div><label>Sport Type</label><select th:field="*{sportType}" required><option th:each="type : ${sportTypes}" th:value="${type}" th:text="${type}"></option></select></div>
            <div class="full"><label>Description</label><textarea th:field="*{description}" required></textarea></div>
            <div><label>Address</label><input th:field="*{address}" required></div>
            <div><label>Price per Hour</label><input type="number" step="0.01" th:field="*{pricePerHour}" required></div>
        </div>
        <div class="actions">
            <button class="btn" type="submit">Create Court</button>
            <a class="link" th:href="@{/home}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
