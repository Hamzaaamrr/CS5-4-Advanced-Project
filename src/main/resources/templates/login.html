<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login | PlayConnect</title>
	<style>
		:root {
			--bg-top: #e8f3ff;
			--bg-bottom: #f9fcff;
			--card-bg: #ffffff;
			--text: #12263a;
			--muted: #5f7182;
			--primary: #0f7ae5;
			--primary-hover: #0b63ba;
			--border: #d7e3f0;
		}
		* {
			box-sizing: border-box;
		}
		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
			display: grid;
			place-items: center;
			padding: 20px;
		}
		.login-card {
			width: 100%;
			max-width: 380px;
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 28px;
			box-shadow: 0 12px 28px rgba(18, 38, 58, 0.12);
		}
		h1 {
			margin: 0 0 8px;
			font-size: 1.55rem;
		}
		p {
			margin: 0 0 20px;
			color: var(--muted);
			font-size: 0.95rem;
		}
		label {
			display: block;
			margin-bottom: 6px;
			font-size: 0.9rem;
			font-weight: 600;
		}
		input {
			width: 100%;
			padding: 11px 12px;
			margin-bottom: 14px;
			border: 1px solid var(--border);
			border-radius: 8px;
			font-size: 0.95rem;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}
		input:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 3px rgba(15, 122, 229, 0.16);
		}
		.row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin: 8px 0 18px;
			font-size: 0.88rem;
			color: var(--muted);
		}
		.row label {
			margin: 0;
			display: inline-flex;
			gap: 6px;
			font-weight: 500;
			color: var(--muted);
			align-items: center;
		}
		.row input[type="checkbox"] {
			width: auto;
			margin: 0;
		}
		a {
			color: var(--primary);
			text-decoration: none;
		}
		a:hover {
			text-decoration: underline;
		}
		button {
			width: 100%;
			border: 0;
			border-radius: 8px;
			padding: 11px 14px;
			font-size: 0.95rem;
			font-weight: 600;
			color: #fff;
			background: var(--primary);
			cursor: pointer;
			transition: background-color 0.2s ease;
		}
		button:hover {
			background: var(--primary-hover);
		}
	</style>
</head>
<body>
	<main class="login-card">
		<h1>Welcome Back</h1>
		<p>Sign in to your PlayConnect account</p>
		
		<div th:if="${error}" class="alert alert-danger" role="alert">
			<p th:text="${error}"></p>
		</div>

		<form th:action="@{/login}" method="post">
			<label for="email">Email</label>
			<input id="email" name="email" type="text" placeholder="you@example.com" required />

			<label for="password">Password</label>
			<input id="password" name="password" type="password" placeholder="Enter your password" required />

			<!-- <div class="row">
				<label for="remember-me">
					<input id="remember-me" name="rememberMe" type="checkbox" />
					Remember me
				</label>
				<a href="#">Forgot password?</a>
			</div> -->

			<button type="submit">Log In</button>
		</form>

		<a th:href="@{/register}" class="btn">Create Account?</a>
	</main>
</body>
</html>
