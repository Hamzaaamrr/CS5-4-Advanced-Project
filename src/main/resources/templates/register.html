<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register | PlayConnect</title>
	<style>
		:root {
			--bg-top: #e8f3ff;
			--bg-bottom: #f9fcff;
			--card-bg: #ffffff;
			--text: #12263a;
			--muted: #5f7182;
			--primary: #0f7ae5;
			--primary-hover: #0b63ba;
			--border: #d7e3f0;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.register-card {
			width: 100%;
			max-width: 420px;
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 28px;
			box-shadow: 0 12px 28px rgba(18, 38, 58, 0.12);
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.55rem;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
			font-size: 0.95rem;
		}

		label {
			display: block;
			margin-bottom: 6px;
			font-size: 0.9rem;
			font-weight: 600;
		}

		input {
			width: 100%;
			padding: 11px 12px;
			margin-bottom: 14px;
			border: 1px solid var(--border);
			border-radius: 8px;
			font-size: 0.95rem;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		input:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 3px rgba(15, 122, 229, 0.16);
		}

		button {
			width: 100%;
			border: 0;
			border-radius: 8px;
			padding: 11px 14px;
			font-size: 0.95rem;
			font-weight: 600;
			color: #fff;
			background: var(--primary);
			cursor: pointer;
			transition: background-color 0.2s ease;
			margin-top: 4px;
		}

		button:hover {
			background: var(--primary-hover);
		}

		.signin-link {
			margin-top: 14px;
			text-align: center;
			font-size: 0.9rem;
			color: var(--muted);
		}

		a {
			color: var(--primary);
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<main class="register-card">
		<h1>Create Account</h1>
		<p>Join PlayConnect and start booking courts</p>

        <div th:if="${error}" style="color: red; margin-bottom: 15px;">
            <p th:text="${error}"></p>
        </div>

		<form th:action="@{/register}" method="post">
			<label for="firstName">First Name</label>
			<input id="firstName" name="firstName" type="text" placeholder="John" required />

			<label for="lastName">Last Name</label>
			<input id="lastName" name="lastName" type="text" placeholder="Doe" required />

			<label for="email">Email</label>
			<input id="email" name="email" type="email" placeholder="you@example.com" required />

            <label for="username">Username</label>
			<input id="username" name="username" type="text" required />

			<label for="password">Password</label>
			<input id="password" name="password" type="password" placeholder="Create a password" required minlength="6" />

			<button type="submit">Register</button>
		</form>

		<div class="signin-link">
			Already have an account? <a th:href="@{/login}">Sign in</a>
		</div>
	</main>
</body>
</html>
