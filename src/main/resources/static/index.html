<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playconnect</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3f7ff, #e6fff2);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #1d2a3a;
        }

        .card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 640px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
            margin-bottom: 0.6rem;
        }

        code {
            background: #f4f6f8;
            border-radius: 6px;
            padding: 0.2rem 0.4rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Playconnect is running</h1>
    <p>Your Spring Boot app started successfully.</p>
    <p>This page is served from <code>src/main/resources/static/index.html</code>.</p>
    <p>Next step: create controllers and templates for your real features.</p>
</div>
</body>
</html>
