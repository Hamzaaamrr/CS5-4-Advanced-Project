<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login | PlayConnect</title>
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
	<style>
        :root {
			--bg-color: #0c0c21;
            --card-bg: #111126;
            --surface-container-lowest: #0c0c21;
            --surface-bright: #37374e;
            --on-surface: #e2e0fd;
            --on-surface-variant: #e4bdc3;
            --primary: #ff2d78;
            --on-primary: #ffffff;
            --outline: #ab888e;
            --error: #ffb4ab;
            --error-container: #93000a;
            --on-error-container: #ffdad6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
			background: radial-gradient(circle at top right, #1d1d33 0%, #0c0c21 100%);
            color: var(--on-surface);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
			position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        p {
            font-size: 16px;
            color: var(--on-surface-variant);
            margin-bottom: 32px;
            text-align: center;
        }

		/* Decorative Rectangles */
        .decor {
            position: absolute;
            z-index: 0;
            pointer-events: none;
            background: white;
            opacity: 0.03;
            transform: rotate(-15deg);
        }
        .decor-1 {
            width: 400px;
            height: 600px;
            top: -100px;
            left: -50px;
        }
        .decor-2 {
            width: 500px;
            height: 700px;
            bottom: -200px;
            right: -100px;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 448px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .alert {
            background-color: var(--error-container);
            color: var(--on-error-container);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .alert p {
            margin-bottom: 0;
            color: inherit;
            text-align: left;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: var(--on-surface-variant);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--surface-bright);
            border: 1px solid var(--outline);
            border-radius: 8px;
            color: var(--on-surface);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(255, 45, 120, 0.2);
        }

        button {
            background-color: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 8px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn:hover {
            text-decoration: underline;
        }
		.signup-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--on-surface-variant);
        }

        .signup-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
	<div class="decor decor-1"></div>
	<div class="decor decor-2"></div>
	<main class="login-card">
		<h1>Welcome Back</h1>
		<p>Enter your credentials to access your dashboard</p>
		
		<div th:if="${error}" class="alert alert-danger" role="alert">
			<p th:text="${error}"></p>
		</div>

		<form th:action="@{/login}" method="post">
			<label for="email">Email</label>
			<input id="email" name="email" type="text" placeholder="you@example.com" required />

			<label for="password">Password</label>
			<input id="password" name="password" type="password" placeholder="Enter your password" required />

			<!-- <div class="row">
				<label for="remember-me">
					<input id="remember-me" name="rememberMe" type="checkbox" />Remember me
				</label>
			</div> -->

			<button type="submit">Log In</button>
		</form>
		
		<p class="signup-text">Don't have an account? <a th:href="@{/register}">Create an account</a></p>
	</main>
</body>
</html>
